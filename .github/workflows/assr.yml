name: assr

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
    - cron: "15 09 * * *" # in our time zone, this is 5:15 AM Eastern Time

permissions:
  contents: write

jobs:
  run-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout logicalgraphs.github.io
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with: 
          repository: pivoteur/protocol
          path: protocol

      - name: Set up rust
        uses: dtolnay/rust-toolchain@stable
          
      - name: Checkout crypto-n-rust
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Build assets
        run: |
          cargo build --manifest-path protocol/dapps/assets/Cargo.toml --bin assets
          echo "$GITHUB_WORKSPACE/protocol/dapps/assets/target/debug" >> $GITHUB_PATH

      - name: Putting date and URL into the env
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "LG_URL=https://raw.githubusercontent.com/logicalgraphs/logicalgraphs.github.io" >> $GITHUB_ENV

      - name: run assets and Log Output
        run: |
          assets lg $LE_DATE >> data/assets.csv

      - name: Commit and push results
        env: 
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run:
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/assets.csv
          git diff --staged --quiet && echo "Nothing to commit, skipping push" && exit 0
          git commit -m "assets $LE_DATE"
          git push
